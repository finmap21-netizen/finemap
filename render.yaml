services:
  - type: web
    name: tax-assistant-api
    env: node
    buildCommand: pnpm install && pnpm --filter sme-tax run build && pnpm --filter api-server run build
    startCommand: pnpm start
    envVars:
      - key: NODE_VERSION
        value: 24.14.1
      - key: PNPM_VERSION
        value: 10.28.2

